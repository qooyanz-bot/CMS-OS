<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="CMS-OS Portal カテゴリ別アクセス制御デモ" />
    <title>CMS-OS Portal</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">CMS-OS / PORTAL</p>
          <h1>カテゴリに応じて、必要な情報だけを届ける。</h1>
          <p class="lead">AIエージェント・API・MCPを中心に設計された業界ポータルのプレビューです。</p>
        </div>
        <div class="status-pill"><span class="status-dot"></span><span id="session-label">未ログイン</span></div>
      </header>

      <section class="control-panel card">
        <div class="control-group">
          <label for="category-select">カテゴリ</label>
          <select id="category-select">
            <option value="legal">士業・弁護士</option>
            <option value="beauty">美容</option>
          </select>
        </div>
        <div class="control-group login-group">
          <label for="account-select">デモアカウント</label>
          <select id="account-select">
            <option value="user@example.com">ユーザー</option>
            <option value="orderer@example.com">発注者</option>
            <option value="lawyer@example.com">士業事業者</option>
            <option value="beauty@example.com">美容事業者</option>
            <option value="candidate@example.com">リクルーター</option>
          </select>
        </div>
        <div class="control-group">
          <label for="role-select">ロール</label>
          <select id="role-select">
            <option value="user">ユーザー</option>
            <option value="orderer">発注者</option>
            <option value="provider">事業者</option>
            <option value="candidate">リクルーター</option>
          </select>
        </div>
        <button id="login-button" class="button primary">ログイン</button>
        <button id="logout-button" class="button ghost" hidden>ログアウト</button>
      </section>

      <p id="message" class="message" role="status"></p>

      <section class="hero-grid">
        <div class="card hero-card">
          <div class="section-kicker">ACTIVE EXPERIENCE</div>
          <div class="hero-title-row">
            <h2 id="category-title">士業・弁護士</h2>
            <span id="role-badge" class="badge">ユーザー</span>
          </div>
          <p id="category-notice" class="muted"></p>
          <div id="module-list" class="module-list"></div>
        </div>
        <div class="card workflow-card">
          <div class="section-kicker">WORKFLOW</div>
          <h2 id="workflow-title">相談テーマから探す</h2>
          <p id="workflow-copy" class="muted"></p>
          <div class="workflow-line">
            <span>01</span><strong id="workflow-step-one">テーマを選ぶ</strong>
            <span>02</span><strong id="workflow-step-two">事業者を比較する</strong>
            <span>03</span><strong id="workflow-step-three">相談する</strong>
          </div>
        </div>
      </section>

      <section class="content-grid">
        <div class="card provider-card">
          <div class="section-heading">
            <div>
              <div class="section-kicker">DISCOVERY</div>
              <h2>事業者を探す</h2>
            </div>
            <input id="provider-search" class="search-input" placeholder="テーマ・地域で検索" />
          </div>
          <div id="provider-list" class="provider-list"></div>
        </div>

        <aside class="side-stack">
          <div id="request-panel" class="card action-card" hidden>
            <div class="section-kicker">ORDERER</div>
            <h2>依頼を作成</h2>
            <form id="request-form">
              <label>依頼タイトル<input name="title" required minlength="3" placeholder="例：初回相談について" /></label>
              <label>依頼内容<textarea name="description" required minlength="10" placeholder="相談したい内容を入力してください"></textarea></label>
              <label>事業者<select name="providerId" id="request-provider"></select></label>
              <button class="button primary" type="submit">依頼を送信</button>
            </form>
          </div>

          <div id="job-panel" class="card action-card">
            <div class="section-kicker">RECRUITMENT</div>
            <h2>カテゴリの求人</h2>
            <div id="job-list" class="job-list"></div>
          </div>
        </aside>
      </section>

      <footer class="footer">CMS-OS · API/MCP-first · カテゴリ別アクセス制御デモ</footer>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
