name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  test:
    name: ビルドとテスト
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Node.jsをセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 依存関係をインストール
        run: npm ci

      - name: JavaScript構文を確認
        run: node --check public/app.js

      - name: ビルドと全テストを実行
        run: npm test

      - name: 差分の空白を確認
        run: git diff --check
